# deploy.yml — Auto-deploy to Nanode on every push to master
#
# SECRETS REQUIRED (GitHub → repo → Settings → Secrets → Actions):
#   NANODE_HOST    — your Nanode IP or wilkeslandia.com
#   NANODE_SSH_KEY — private SSH key for the fishingagent user

name: Deploy to Nanode

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Nanode via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NANODE_HOST }}
          username: fishingagent
          key: ${{ secrets.NANODE_SSH_KEY }}
          script: |
            cd /opt/fishing-agent
            git pull origin master
            /opt/fishing-agent/venv/bin/pip install -r requirements.txt --quiet

            # Copy the HTML display page to the web root so nginx serves it
            cp /opt/fishing-agent/sites/fish-warden/index.html /var/www/fishing-agent/index.html

            echo "Deploy complete: $(date)"
